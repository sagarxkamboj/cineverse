server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials RETAIN_LAST
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/auth/**
        - id: movie-service
          uri: ${MOVIE_SERVICE_URI:http://localhost:8082}
          predicates:
            - Path=/movies/**, /reviews/**
        - id: booking-service
          uri: ${BOOKING_SERVICE_URI:http://localhost:8083}
          predicates:
            - Path=/bookings/**, /shows/**, /theatres/**

jwt:
  secret: ${JWT_SECRET:9a4f2c8d3b7a1e6f45c8a0b3f267d8b1d4e6f3c8a9d2b5f8e3a9c8b5f6v8a3d9}
