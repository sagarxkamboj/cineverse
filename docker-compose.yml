version: '3.8'

services:
  # Databases & Middlewares
  db:
    image: postgres:15-alpine
    container_name: cineverse_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: cineverse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cineverse"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  mongo:
    image: mongo:6-jammy
    container_name: cineverse_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - mongodata:/data/db

  redis:
    image: redis:7-alpine
    container_name: cineverse_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: cineverse_rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Microservices
  auth-service:
    build:
      context: ./backend
      dockerfile: auth-service/Dockerfile
    container_name: cineverse_auth_service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - DB_URL=jdbc:postgresql://db:5432/cineverse
      - DB_USERNAME=postgres
      - DB_PASSWORD=password
      - JWT_SECRET=9a4f2c8d3b7a1e6f45c8a0b3f267d8b1d4e6f3c8a9d2b5f8e3a9c8b5f6v8a3d9
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173,http://localhost:8080
    depends_on:
      db:
        condition: service_healthy

  movie-service:
    build:
      context: ./backend
      dockerfile: movie-service/Dockerfile
    container_name: cineverse_movie_service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      - MONGO_URI=mongodb://mongo:27017/cineverse
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173,http://localhost:8080
    depends_on:
      mongo:
        condition: service_healthy

  booking-service:
    build:
      context: ./backend
      dockerfile: booking-service/Dockerfile
    container_name: cineverse_booking_service
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      - DB_URL=jdbc:postgresql://db:5432/cineverse
      - DB_USERNAME=postgres
      - DB_PASSWORD=password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - JWT_SECRET=9a4f2c8d3b7a1e6f45c8a0b3f267d8b1d4e6f3c8a9d2b5f8e3a9c8b5f6v8a3d9
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173,http://localhost:8080
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notification-service:
    build:
      context: ./backend
      dockerfile: notification-service/Dockerfile
    container_name: cineverse_notification_service
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
    depends_on:
      rabbitmq:
        condition: service_healthy

  api-gateway:
    build:
      context: ./backend
      dockerfile: api-gateway/Dockerfile
    container_name: cineverse_api_gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - AUTH_SERVICE_URI=http://auth-service:8081
      - MOVIE_SERVICE_URI=http://movie-service:8082
      - BOOKING_SERVICE_URI=http://booking-service:8083
      - JWT_SECRET=9a4f2c8d3b7a1e6f45c8a0b3f267d8b1d4e6f3c8a9d2b5f8e3a9c8b5f6v8a3d9
    depends_on:
      - auth-service
      - movie-service
      - booking-service

  # React Frontend Web Server
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8080
    container_name: cineverse_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api-gateway

volumes:
  pgdata:
  mongodata:
